<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シンプルタイマー</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1D9E75">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="タイマー">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .timer-wrap { background: white; border-radius: 16px; padding: 2.5rem 2rem; text-align: center; box-shadow: 0 2px 16px rgba(0,0,0,0.08); width: 320px; }
    h1 { font-size: 18px; font-weight: 500; color: #333; margin-bottom: 1.5rem; }
    .preset { display: flex; gap: 8px; justify-content: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .preset button { font-size: 13px; color: #666; background: #f0f0f0; border: none; border-radius: 8px; padding: 6px 12px; cursor: pointer; }
    .preset button:hover { background: #e0e0e0; }
    .ring-wrap { position: relative; width: 200px; height: 200px; margin: 0 auto 1.5rem; }
    svg.ring { transform: rotate(-90deg); }
    circle.bg { fill: none; stroke: #e8e8e8; stroke-width: 8; }
    circle.prog { fill: none; stroke: #1D9E75; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.5s linear; }
    .display-inner { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .display { font-size: 52px; font-weight: 500; font-family: monospace; color: #222; letter-spacing: 2px; }
    .controls { display: flex; gap: 12px; justify-content: center; }
    .controls button { font-size: 15px; padding: 10px 24px; border-radius: 8px; border: 1px solid #ccc; background: white; cursor: pointer; color: #333; }
    .controls button:hover { background: #f0f0f0; }
    #startBtn { background: #1D9E75; color: white; border-color: #1D9E75; }
    #startBtn:hover { background: #178a65; }
  </style>
</head>
<body>
<div class="timer-wrap">
  <h1>タイマー</h1>
  <div class="preset">
    <button onclick="setTimer(60)">1分</button>
    <button onclick="setTimer(180)">3分</button>
    <button onclick="setTimer(300)">5分</button>
    <button onclick="setTimer(600)">10分</button>
    <button onclick="setTimer(1500)">25分</button>
  </div>
  <div class="ring-wrap">
    <svg class="ring" width="200" height="200" viewBox="0 0 200 200">
      <circle class="bg" cx="100" cy="100" r="88"/>
      <circle class="prog" id="prog" cx="100" cy="100" r="88" stroke-dasharray="553" stroke-dashoffset="0"/>
    </svg>
    <div class="display-inner">
      <div class="display" id="display">05:00</div>
    </div>
  </div>
  <div class="controls">
    <button id="startBtn" onclick="toggle()">スタート</button>
    <button onclick="reset()">リセット</button>
  </div>
</div>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }

  let total = 300, remaining = 300, interval = null, running = false;
  const circumference = 553;
  const prog = document.getElementById('prog');

  function fmt(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
  }
  function updateUI() {
    document.getElementById('display').textContent = fmt(remaining);
    prog.style.strokeDashoffset = circumference * (1 - remaining / total);
    prog.style.stroke = remaining === 0 ? '#E24B4A' : '#1D9E75';
  }
  function toggle() {
    if (running) {
      clearInterval(interval);
      running = false;
      document.getElementById('startBtn').textContent = 'スタート';
    } else {
      if (remaining === 0) return;
      running = true;
      document.getElementById('startBtn').textContent = '一時停止';
      interval = setInterval(() => {
        remaining--;
        updateUI();
        if (remaining === 0) {
          clearInterval(interval);
          running = false;
          document.getElementById('startBtn').textContent = 'スタート';
        }
      }, 1000);
    }
  }
  function reset() {
    clearInterval(interval);
    running = false;
    remaining = total;
    document.getElementById('startBtn').textContent = 'スタート';
    updateUI();
  }
  function setTimer(sec) {
    clearInterval(interval);
    running = false;
    total = sec;
    remaining = sec;
    document.getElementById('startBtn').textContent = 'スタート';
    updateUI();
  }
  updateUI();
</script>
</body>
</html>
